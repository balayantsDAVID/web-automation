name: CI-CD-pipeline-to-AWS-Elastic_Beanstalk
env:
  EB_PACKAGE_S3_BUCKET_NAME: "my-web-app-node"
  EB_APPLICATION_NAME      : "Quest-Theme-App"
  EB_ENVIRONMENT_NAME      : "Quest-Theme-App-env"
  DEPLOY_PACKAGE_NAME      : "quest_app_${{ github.sha }}.zip"
  AWS_REGION_NAME          : "eu-central-1"

on:
 push:
  branches:
    - main

jobs:
  CI_part:
   runs-on: ubuntu-latest
   steps:
     - name: Git clone repo
       uses: actions/checkout@v1

     - name: Create ZIP deployment package
       run: zip -r ${{ env.DEPLOY_PACKAGE_NAME }} ./ -x Dockerfile -x "docker-compose*" -x "*.git*"
       
     - name: Configure AWS Credentials
       uses: aws-actions/configure-aws-credentials@v1
       with:
         aws-access-key-id    : ${{ secrets.AWS_ACCESS_KEY }}
         aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
         aws-region           : ${{ env.AWS_REGION_NAME }}
         
     - name: Copoy Deployment package to S3 bucket
       run: aws s3 cp ${{ env.DEPLOY_PACKAGE_NAME }} s3://${{ env.EB_PACKAGE_S3_BUCKET_NAME }}

     - name: Print Message for CI finish
       run: echo "CI Pipeline finished Successfully"
       
  CD_PART:
   runs-on: ubuntu-latest
   needs: CI_part
   steps:
     - name: Configure AWS Credentials
       uses: aws-actions/configure-aws-credentials@v1
       with:
         aws-access-key-id    : ${{ secrets.AWS_ACCESS_KEY }}
         aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
         aws-region           : ${{ env.AWS_REGION_NAME }}
         
     - name: Create New Elastic_Beanstalk App
       run: |
         aws elasticbeanstalk create-application-version \
         --application-name ${{ env.EB_APPLICATION_NAME }} \ 
         --source-bundle S3Bucket="${{ env.EB_PACKAGE_S3_BUCKET_NAME }}",S3Key="${{ env.DEPLOY_PACKAGE_NAME }}" \ 
         --version-label "Version-${{ github.sha }}" \
         --description "CommitSHA-${{ github.sha }}"
         
     - name: Deploy  new Elastic_Beanstalk Allpication Version
       run: aws elasticbeanstalk update-environment --environment-name ${{ env.EB_ENVIRONMENT_NAME }} --version-label "Version-${{ github.sha }}"

     - name: Print Message for CD finish
       run: echo "CD Pipeline finished Successfully"
