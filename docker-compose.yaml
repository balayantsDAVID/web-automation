services:
  app:
    image: quest:v1
    ports:
      - "3001:3001"
    networks:
      - quest-network
      - mongo-network
    depends_on:
      - mongo

  mongo:
    image: mongo:latest
    ports:
      - "27017-27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - mongo-network
  
  mongo-express:
    image: mongo-express:latest
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_SERVER=mongo
    networks:
      - mongo-network

networks:
  quest-network:
  mongo-network:
    driver: bridge

volumes:
  mongo_data:
  